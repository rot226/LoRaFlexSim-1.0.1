name: mobilesfrdth smoke test

on:
  push:
  pull_request:

jobs:
  smoke-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e .

      - name: CLI smoke (mobilesfrdth --help == 0)
        run: |
          mobilesfrdth --help
          mobilesfrdth run --help
          python -m sfrd.cli.run_campaign --help

  smoke-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Install package in venv
        shell: pwsh
        run: .\.venv\Scripts\python -m pip install -e .

      - name: Check Windows launcher exists
        shell: pwsh
        run: |
          if (-not (Test-Path .\.venv\Scripts\mobilesfrdth.exe)) {
            Write-Error "Launcher manquant: .venv\\Scripts\\mobilesfrdth.exe"
          }

      - name: CLI smoke (mobilesfrdth --help == 0)
        shell: pwsh
        run: |
          .\.venv\Scripts\mobilesfrdth.exe --help
          .\.venv\Scripts\python -m sfrd.cli.run_campaign --help
